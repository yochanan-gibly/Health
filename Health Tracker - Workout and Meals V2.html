<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Workout Tracker">
<meta name="theme-color" content="#1a73e8">
<title>Workout Tracker</title>
<style>
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;--text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.2);
  --blue:#1a73e8;--blue-bg:#e8f0fe;--blue-text:#1a56db;
  --green:#188038;--green-bg:#e6f4ea;--green-text:#137333;
  --amber:#b45309;--amber-bg:#fef3c7;--amber-text:#92400e;
  --red:#c0392b;--red-bg:#fce8e6;--red-text:#a50e0e;
  --purple:#6d28d9;--purple-bg:#ede9fe;--purple-text:#5b21b6;
  --teal:#0d7377;--teal-bg:#e0f4f4;--teal-text:#0d7377;
  --orange:#c2410c;--orange-bg:#fff7ed;--orange-text:#c2410c;
  --r:12px;--rs:8px;--sh:0 1px 3px rgba(0,0,0,.1);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
    --blue:#4da3ff;--blue-bg:#1c3461;--blue-text:#7ab8ff;
    --green:#34c759;--green-bg:#0d3320;--green-text:#4cd964;
    --amber:#ffd60a;--amber-bg:#3d2d00;--amber-text:#ffd60a;
    --red:#ff453a;--red-bg:#3d1414;--red-text:#ff6b6b;
    --purple:#bf5af2;--purple-bg:#2d1b4e;--purple-text:#d89cf6;
    --teal:#4dd0d0;--teal-bg:#0d2e2e;--teal-text:#4dd0d0;
    --orange:#fb923c;--orange-bg:#431407;--orange-text:#fb923c;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg2);color:var(--text);font-size:15px;min-height:100vh;}
.app{max-width:480px;margin:0 auto;background:var(--bg2);min-height:100vh;}
/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;font-weight:500;}
.nav-btn.active{color:var(--blue);}
.nav-btn svg{width:22px;height:22px;}
.page{display:none;padding:0 0 80px;}
.page.active{display:block;}
/* HEADER */
.page-header{background:var(--bg);padding:16px 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.page-header h1{font-size:20px;font-weight:600;}
.page-header .sub{font-size:13px;color:var(--text2);margin-top:2px;}
/* CARD */
.card{background:var(--bg);border-radius:var(--r);margin:12px 12px 0;overflow:hidden;}
.card-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.card-header h2{font-size:15px;font-weight:600;}
/* WEEK NAV */
.week-nav{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--border);}
.week-nav button{padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;}
.week-nav .wk-label{flex:1;text-align:center;font-size:13px;font-weight:500;color:var(--text2);}
.week-nav .today-btn{background:var(--blue-bg);color:var(--blue-text);border-color:transparent;}
/* DAY TABS */
.day-tabs{display:flex;gap:6px;padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:6px 10px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;text-align:center;min-width:46px;}
.day-tab .dt-day{font-weight:500;}
.day-tab .dt-num{font-size:11px;margin-top:1px;}
.day-tab.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.day-tab.today-marker{border-color:var(--blue);}
/* MODE TOGGLE */
.mode-toggle{display:flex;margin:12px 12px 0;background:var(--bg3);border-radius:10px;padding:3px;}
.mode-btn{flex:1;padding:7px;border-radius:8px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;}
.mode-btn.active{background:var(--bg);color:var(--blue);box-shadow:var(--sh);}
/* TRACKERS */
.tracker-grid{display:flex;flex-direction:column;gap:10px;padding:12px;}
.tracker-box{background:var(--bg2);border-radius:var(--rs);padding:12px 14px;display:grid;grid-template-columns:1fr auto;column-gap:14px;align-items:center;}
.tracker-box .t-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;grid-column:1;}
.tracker-box .t-val{font-size:26px;font-weight:600;color:var(--text);line-height:1.1;grid-column:1;}
.tracker-box .t-sub{font-size:11px;color:var(--text3);margin-top:2px;grid-column:1;}
.tracker-box .t-prog-wrap{grid-column:1;margin-top:6px;}
.tracker-box .t-input-col{grid-column:2;grid-row:1/6;display:flex;flex-direction:column;gap:6px;min-width:82px;}
.prog-bar{height:5px;border-radius:3px;background:var(--bg3);overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width .3s;}
.t-input-col input{width:100%;padding:7px 8px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;text-align:center;}
.t-add-btn{padding:7px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:700;cursor:pointer;}
.t-sub-btn{padding:5px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;}
.t-reset-btn{padding:5px;border-radius:8px;border:none;background:var(--red-bg);color:var(--red-text);font-size:12px;cursor:pointer;}
/* WEIGHT */
.weight-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 12px;}
.weight-box{background:var(--bg2);border-radius:var(--rs);padding:12px;}
.weight-box .w-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.weight-box .w-cur{font-size:22px;font-weight:600;margin-bottom:8px;}
.weight-box input{width:100%;padding:6px 8px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;margin-bottom:6px;}
.weight-box .w-btns{display:flex;gap:6px;}
.w-save-btn{flex:1;padding:6px;border-radius:8px;border:none;background:var(--purple-bg);color:var(--purple-text);font-size:13px;font-weight:600;cursor:pointer;}
.w-reset-btn{padding:6px 8px;border-radius:8px;border:none;background:var(--red-bg);color:var(--red-text);font-size:13px;cursor:pointer;}
/* SECTION LABEL */
.section-label{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:14px 16px 6px;}
/* BADGES */
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;}
.badge-green{background:var(--green-bg);color:var(--green-text);}
.badge-amber{background:var(--amber-bg);color:var(--amber-text);}
.badge-teal{background:var(--teal-bg);color:var(--teal-text);}
.badge-orange{background:var(--orange-bg);color:var(--orange-text);}
/* EX CARD */
.ex-card{background:var(--bg);border-radius:var(--r);margin:8px 12px 0;transition:opacity .2s;}
.ex-card.is-done{opacity:.55;}
.ex-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.ex-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.ex-meta{font-size:12px;color:var(--text2);margin-top:3px;}
.ex-body{padding:10px 16px 14px;}
.ex-desc{font-size:13px;color:var(--text2);line-height:1.55;margin-top:8px;padding:8px 10px;background:var(--bg2);border-radius:8px;border-left:3px solid var(--border2);}
.sets-grid{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.set-row{display:flex;gap:8px;align-items:center;}
.set-num{font-size:12px;color:var(--text3);font-weight:600;min-width:36px;}
.set-row input{flex:1;min-width:0;padding:7px 8px;border:1px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);font-size:14px;text-align:center;}
.set-label{font-size:12px;color:var(--text3);min-width:28px;}
.prev-tip{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--blue-bg);color:var(--blue-text);white-space:nowrap;}
textarea.note{width:100%;margin-top:8px;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);font-size:13px;resize:none;min-height:48px;font-family:inherit;}
.done-row{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
.done-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;}
.done-btn.done{background:var(--green-bg);color:var(--green-text);border-color:transparent;}
/* COMPLETED SECTION */
.completed-section{margin:10px 12px 0;}
.completed-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:var(--r);border:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;}
.completed-toggle .ct-count{font-size:11px;background:var(--green-bg);color:var(--green-text);padding:2px 8px;border-radius:20px;}
.completed-toggle .ct-arrow{font-size:12px;transition:transform .2s;}
.completed-toggle.open .ct-arrow{transform:rotate(180deg);}
.completed-list{display:none;margin-top:2px;}
.completed-list.open{display:block;}
.completed-item{background:var(--bg);border-radius:var(--r);margin-top:6px;opacity:.6;}
.completed-item .ci-header{padding:12px 14px;display:flex;align-items:center;gap:8px;}
.completed-item .ci-check{color:var(--green-text);font-size:15px;}
.completed-item .ci-name{font-size:14px;font-weight:500;flex:1;}
.completed-item .ci-undo{padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text2);font-size:12px;cursor:pointer;}
/* TIMER */
.timer-wrap{margin-top:10px;background:var(--bg2);border-radius:10px;overflow:hidden;}
.timer-display{padding:12px 16px 8px;}
.timer-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.timer-phase{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
.timer-phase.work{color:var(--green-text);}
.timer-phase.rest{color:var(--orange-text);}
.timer-phase.paused{color:var(--text3);}
.timer-clock{font-size:38px;font-weight:700;letter-spacing:.02em;font-variant-numeric:tabular-nums;line-height:1;color:var(--text);}
.timer-bar-wrap{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.timer-bar-fill{height:100%;border-radius:4px;transition:width .9s linear;background:var(--green);}
.timer-bar-fill.rest-phase{background:var(--orange);}
.timer-controls{display:flex;gap:8px;padding:10px 16px 14px;}
.timer-btn{flex:1;padding:9px 8px;border-radius:22px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
.tbtn-start{background:var(--green-bg);color:var(--green-text);}
.tbtn-pause{background:var(--amber-bg);color:var(--amber-text);}
.tbtn-stop{background:var(--red-bg);color:var(--red-text);}
.tbtn-reset{background:var(--bg3);color:var(--text2);}
.timer-interval-info{display:flex;gap:8px;padding:0 16px 4px;}
.tii-box{flex:1;background:var(--bg);border-radius:8px;padding:7px 8px;text-align:center;}
.tii-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.tii-val{font-size:15px;font-weight:600;margin-top:2px;}
/* STRETCH */
.stretch-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.stretch-item:last-child{border-bottom:none;padding-bottom:0;}
.stretch-item.is-done{opacity:.55;}
.stretch-done-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);background:none;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);}
.stretch-done-btn.done{background:var(--teal);border-color:var(--teal);color:#fff;}
.stretch-info{flex:1;}
.stretch-name{font-size:14px;font-weight:500;}
.stretch-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.stretch-desc{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.55;padding:6px 8px;background:var(--bg2);border-radius:8px;border-left:2px solid var(--teal-bg);}
/* CALENDAR MODAL */
.cal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.cal-sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:0 0 env(safe-area-inset-bottom);max-height:88vh;overflow-y:auto;}
.cal-handle{width:40px;height:4px;background:var(--bg3);border-radius:2px;margin:12px auto 0;}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
.cal-header h2{font-size:18px;font-weight:600;}
.cal-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg3);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-month-nav{display:flex;align-items:center;gap:8px;padding:4px 16px 12px;}
.cal-month-nav button{padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;}
.cal-month-label{flex:1;text-align:center;font-size:15px;font-weight:600;}
.cal-grid{padding:0 12px 16px;}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:4px 0;text-transform:uppercase;}
.cal-weeks{display:flex;flex-direction:column;gap:3px;}
.cal-week-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{border-radius:8px;padding:6px 2px;text-align:center;cursor:pointer;position:relative;}
.cal-day .cd-num{font-size:14px;font-weight:500;color:var(--text);}
.cal-day .cd-dot{width:4px;height:4px;border-radius:50%;background:var(--blue);margin:2px auto 0;}
.cal-day.other-month .cd-num{color:var(--text3);}
.cal-day.today-cal{background:var(--blue-bg);}
.cal-day.today-cal .cd-num{color:var(--blue-text);font-weight:700;}
.cal-day.selected-cal{background:var(--blue);border-radius:8px;}
.cal-day.selected-cal .cd-num{color:#fff;font-weight:700;}
.cal-day.has-data .cd-dot{background:var(--green);}
.cal-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.completed-section{margin:8px 0 0;}
.section-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:var(--r);border:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;text-align:left;}
.section-toggle .st-label{flex:1;}
.section-toggle .st-right{display:flex;align-items:center;gap:8px;}
.st-count{font-size:11px;padding:2px 8px;border-radius:20px;}
.st-count-inc{background:var(--blue-bg);color:var(--blue-text);}
.st-count-done{background:var(--green-bg);color:var(--green-text);}
.st-arrow{font-size:12px;transition:transform .2s;}
.section-toggle.open .st-arrow{transform:rotate(180deg);}
.section-list{display:none;margin-top:2px;}
.section-list.open{display:block;}
.completed-item{background:var(--bg);border-radius:var(--r);margin-top:6px;opacity:.6;}
.completed-item .ci-header{padding:12px 14px;display:flex;align-items:center;gap:8px;}
.ci-check{color:var(--green-text);font-size:15px;}
.ci-name{font-size:14px;font-weight:500;flex:1;}
.ci-undo{padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text2);font-size:12px;cursor:pointer;}
/* CARDIO */
.cardio-card{background:var(--bg);border-radius:var(--r);margin:0 12px;}
.cardio-inner{padding:14px 16px;}
.cardio-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.log-row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;}
.log-row label{font-size:12px;color:var(--text3);}
.log-row input{width:80px;padding:6px 8px;border:1px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);font-size:13px;}
/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px;}
.sum-box{background:var(--bg2);border-radius:var(--rs);padding:10px 12px;}
.sum-label{font-size:11px;color:var(--text3);margin-bottom:3px;}
.sum-val{font-size:18px;font-weight:600;}
/* SETTINGS */
.settings-section{margin:12px 12px 0;}
.settings-item{background:var(--bg);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.settings-row{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-row .s-title{font-size:15px;font-weight:500;}
.settings-row .s-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.s-btn{padding:8px 16px;border-radius:20px;border:none;font-size:14px;font-weight:600;cursor:pointer;}
.s-btn-blue{background:var(--blue-bg);color:var(--blue-text);}
.s-btn-red{background:var(--red-bg);color:var(--red-text);}
.s-btn-green{background:var(--green-bg);color:var(--green-text);}
.goals-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;}
.goal-box label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;}
.goal-box input{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);font-size:15px;}
.unit-toggle-row{display:flex;gap:10px;padding:0 16px 14px;flex-wrap:wrap;}
.unit-group{flex:1;min-width:120px;}
.unit-group label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500;}
.unit-pill-row{display:flex;background:var(--bg3);border-radius:8px;padding:2px;}
.unit-pill{flex:1;padding:6px 4px;border:none;background:none;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;}
.unit-pill.active{background:var(--bg);color:var(--blue);box-shadow:var(--sh);}
/* STATS */
.stats-week-list{padding:0 12px;}
.stats-week{background:var(--bg);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.stats-week-head{padding:12px 16px;font-weight:600;font-size:14px;border-bottom:1px solid var(--border);}
.stats-day-row{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:13px;}
.stats-day-row:last-child{border-bottom:none;}
.sd-day{font-weight:500;}
.sd-vals{color:var(--text2);font-size:12px;display:flex;gap:10px;flex-wrap:wrap;}
.sd-done{font-size:12px;}
.sd-done.full{color:var(--green-text);}
.no-data{text-align:center;color:var(--text3);padding:40px 16px;font-size:14px;}
/* GRAPHS */
.graph-card{background:var(--bg);border-radius:var(--r);margin:12px 12px 0;overflow:hidden;}
.graph-card-header{padding:14px 16px 6px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.graph-card-header h2{font-size:15px;font-weight:600;}
.graph-range-row{display:flex;gap:4px;}
.graph-range-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;}
.graph-range-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.graph-body{padding:12px 16px 16px;overflow-x:auto;}
.graph-svg{display:block;width:100%;overflow:visible;}
.graph-empty{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px;}
.graph-legend{display:flex;gap:14px;flex-wrap:wrap;padding:0 16px 14px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.ex-picker{padding:10px 16px 0;display:flex;flex-direction:column;gap:8px;}
.ex-picker label{font-size:12px;color:var(--text2);font-weight:500;}
.ex-picker select{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);font-size:14px;}
.ex-metric-row{display:flex;gap:6px;padding:8px 16px 0;}
.ex-metric-btn{flex:1;padding:6px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;text-align:center;}
.ex-metric-btn.active{background:var(--purple-bg);color:var(--purple-text);border-color:transparent;}
.tooltip-box{position:fixed;background:rgba(26,26,26,.92);color:#fff;font-size:12px;padding:6px 10px;border-radius:8px;pointer-events:none;z-index:500;display:none;line-height:1.5;}
/* MEALS */
.meals-header{background:var(--bg);padding:14px 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;}
.meals-header h1{font-size:20px;font-weight:600;}
.meals-header .sub{font-size:13px;color:var(--text2);margin-top:1px;}
.journal-btn{padding:6px 12px;border-radius:20px;border:none;background:var(--purple-bg);color:var(--purple-text);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.meals-day-nav{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--border);}
.meals-day-nav button{padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;}
.meals-day-nav .mdl{flex:1;text-align:center;font-size:13px;font-weight:500;color:var(--text2);}
.calorie-ring-card{background:var(--bg);border-radius:var(--r);margin:12px 12px 0;padding:16px;}
.calorie-summary{display:flex;align-items:center;gap:16px;}
.calorie-ring{flex-shrink:0;}
.calorie-stats{flex:1;display:flex;flex-direction:column;gap:6px;}
.cal-stat-row{display:flex;justify-content:space-between;align-items:center;}
.cal-stat-label{font-size:12px;color:var(--text2);}
.cal-stat-val{font-size:14px;font-weight:600;}
.cal-stat-val.over{color:var(--red-text);}
.cal-stat-val.under{color:var(--green-text);}
.macro-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.macro-box{background:var(--bg2);border-radius:var(--rs);padding:8px;text-align:center;}
.macro-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.macro-val{font-size:16px;font-weight:600;margin-top:2px;}
.meal-section{margin:12px 12px 0;}
.meal-section-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:var(--r) var(--r) 0 0;border-bottom:1px solid var(--border);}
.meal-section-head h3{font-size:14px;font-weight:600;}
.meal-section-head .meal-cals{font-size:12px;color:var(--text2);}
.meal-section-body{background:var(--bg);border-radius:0 0 var(--r) var(--r);}
.meal-food-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
.meal-food-row:last-child{border-bottom:none;}
.meal-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;}
.meal-check.checked{background:var(--green);border-color:var(--green);color:#fff;}
.meal-food-info{flex:1;}
.meal-food-name{font-size:14px;font-weight:500;}
.meal-food-meta{font-size:12px;color:var(--text2);margin-top:1px;}
.meal-food-cals{font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;}
.meal-food-del{width:26px;height:26px;border-radius:50%;border:none;background:none;color:var(--text3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.add-food-btn{width:100%;padding:10px;border:none;background:var(--blue-bg);color:var(--blue-text);font-size:13px;font-weight:600;cursor:pointer;border-radius:0 0 var(--r) var(--r);}
/* MEAL ADD SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:0 0 env(safe-area-inset-bottom);max-height:92vh;overflow-y:auto;}
.sheet-handle{width:40px;height:4px;background:var(--bg3);border-radius:2px;margin:12px auto 6px;}
.sheet-header{padding:10px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.sheet-header h2{font-size:17px;font-weight:600;}
.sheet-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg3);color:var(--text2);font-size:16px;cursor:pointer;}
.sheet-body{padding:16px;}
.field-group{margin-bottom:14px;}
.field-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.field-group input,.field-group select,.field-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text);font-size:15px;font-family:inherit;}
.field-group textarea{resize:none;min-height:72px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sheet-submit{width:100%;padding:13px;border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:700;border-radius:12px;cursor:pointer;margin-top:4px;}
.search-results{margin-top:8px;border:1px solid var(--border2);border-radius:10px;overflow:hidden;max-height:220px;overflow-y:auto;}
.search-result-row{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .1s;}
.search-result-row:last-child{border-bottom:none;}
.search-result-row:active,.srr-selected{background:var(--blue-bg);}
.srr-name{font-size:14px;font-weight:500;}
.srr-cal{font-size:12px;color:var(--text2);white-space:nowrap;margin-left:8px;}
/* QUANTITY PANEL */
.qty-panel{background:var(--bg2);border-radius:12px;padding:14px;margin-top:12px;}
.qty-food-name{font-size:15px;font-weight:600;margin-bottom:10px;}
.qty-mode-row{display:flex;gap:6px;margin-bottom:12px;}
.qty-mode-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;}
.qty-mode-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.qty-input-row{margin-bottom:12px;}
.qty-input-row label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500;}
.qty-input-row>div{display:flex;align-items:center;gap:8px;}
.qty-stepper{width:36px;height:36px;border-radius:10px;border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qty-input{flex:1;padding:8px 10px;border:1px solid var(--border2);border-radius:10px;background:var(--bg);color:var(--text);font-size:18px;font-weight:600;text-align:center;}
.qty-preview{background:var(--bg);border-radius:10px;padding:12px;text-align:center;margin-bottom:12px;}
.qty-preview-cals{font-size:28px;font-weight:700;color:var(--text);}
.qty-preview-macros{font-size:13px;color:var(--text2);margin-top:4px;}
.qty-preview-serving{font-size:12px;color:var(--text3);margin-top:3px;}
.add-food-divider{text-align:center;color:var(--text3);font-size:12px;margin:16px 0 8px;position:relative;}
.add-food-divider::before,.add-food-divider::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:var(--border);}
.add-food-divider::before{left:0;}.add-food-divider::after{right:0;}
.add-food-manual-btn{width:100%;padding:11px;border:1.5px dashed var(--border2);border-radius:12px;background:none;color:var(--text2);font-size:13px;cursor:pointer;margin-bottom:8px;}
/* JOURNAL SHEET */
.journal-tabs{display:flex;border-bottom:1px solid var(--border);}
.journal-tab{flex:1;padding:10px 6px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;}
.journal-tab.active{color:var(--purple-text);border-bottom-color:var(--purple);}
.journal-food-row{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.journal-food-row:last-child{border-bottom:none;}
.jfr-info{flex:1;}
.jfr-name{font-size:14px;font-weight:600;}
.jfr-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.jfr-cals{font-size:14px;font-weight:600;color:var(--amber-text);}
.jfr-del{padding:4px 8px;border-radius:8px;border:none;background:var(--red-bg);color:var(--red-text);font-size:12px;cursor:pointer;}
.recipe-card{margin:12px 16px 0;background:var(--bg2);border-radius:var(--r);overflow:hidden;}
.recipe-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;}
.recipe-name{font-size:14px;font-weight:600;}
.recipe-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.recipe-expand{padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text2);font-size:12px;cursor:pointer;}
.recipe-details{padding:0 14px 12px;font-size:13px;color:var(--text2);line-height:1.6;display:none;}
.recipe-details.open{display:block;}
.empty-journal{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px;}
.add-journal-btn{margin:12px 16px;width:calc(100% - 32px);padding:11px;border:2px dashed var(--border2);border-radius:12px;background:none;color:var(--text2);font-size:14px;cursor:pointer;}
/* APPEARANCE SETTINGS */
.s-sub-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.theme-swatch-row{display:flex;gap:8px;flex-wrap:wrap;}
.theme-swatch{display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:none;cursor:pointer;padding:0;}
.ts-preview{width:44px;height:44px;border-radius:12px;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;transition:border-color .15s;}
.ts-active .ts-preview{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-bg);}
.ts-label{font-size:10px;color:var(--text2);text-align:center;max-width:52px;line-height:1.2;}
.accent-swatch-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;}
.accent-swatch{width:34px;height:34px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;transition:border-color .15s;}
.as-active{border-color:var(--text)!important;box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--text);}
.custom-colors-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.custom-color-item label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;}
.color-picker-row{display:flex;align-items:center;gap:8px;}
.color-picker-row input[type=color]{width:36px;height:36px;border:1px solid var(--border2);border-radius:8px;padding:2px;background:var(--bg2);cursor:pointer;}
.color-picker-row span{font-size:12px;color:var(--text3);font-family:monospace;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:300px;text-align:center;}
.toast.show{opacity:1;}
</style>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const STRETCHES={
  morning:[
    {name:'Cat-cow',duration:'60s',seconds:60,desc:'Start on hands and knees. On inhale drop belly, lift head and tailbone (cow). On exhale round spine up, tuck chin and pelvis (cat). Flow slowly and breathe deeply. Wakes up the entire spine.'},
    {name:"Child's pose",duration:'45s',seconds:45,desc:'Kneel, sit back toward heels, reach arms forward on the floor, forehead down. Breathe into your lower back. Releases hips and lumbar spine.'},
    {name:'Supine twist',duration:'30s each side',seconds:60,desc:'Lie on back, pull one knee to chest then let it cross to the opposite side. Extend opposite arm out. Hold and breathe. Rotates the spine and releases lower back and glutes.'},
    {name:'Hip flexor stretch (kneeling)',duration:'30s each side',seconds:60,desc:'Kneel on one knee, other foot forward. Shift weight forward until you feel a pull through the front of the back hip. Keep torso upright.'},
    {name:'Doorframe chest opener',duration:'30s',seconds:30,desc:'Stand in a doorway, forearms on the frame at 90°. Lean forward until you feel a stretch across your chest. Counteracts overnight forward shoulder rounding.'},
    {name:'Standing forward fold',duration:'45s',seconds:45,desc:'Stand feet hip-width, soften knees, hinge forward letting upper body hang. Let gravity do the work. Nod head yes and no to release neck tension.'},
  ],
  evening:[
    {name:'Legs up the wall',duration:'2 min',seconds:120,desc:'Lie on back, scoot to wall, extend legs up it. Arms out to sides. Drains fluid from tired legs, calms the nervous system, and prepares the body for sleep.'},
    {name:'Seated forward fold',duration:'60s',seconds:60,desc:'Sit with legs extended straight. Hinge from hips and reach toward feet. Do not round your back. Hold whatever you can reach.'},
    {name:'Pigeon pose',duration:'60s each side',seconds:120,desc:'From a plank, bring one knee forward behind your wrist. Extend the back leg. Lower hips toward the floor and fold forward. One of the deepest hip openers.'},
    {name:'Reclining butterfly',duration:'90s',seconds:90,desc:'Lie on back, soles of feet together, knees fall out to the sides. Let gravity open your hips. Releases inner thighs and groin.'},
    {name:'Neck rolls',duration:'60s',seconds:60,desc:'Sit or lie comfortably. Slowly roll chin to one shoulder, down through center, and to the other. Never force range. Releases neck and trapezius.'},
    {name:'Spinal twist (seated)',duration:'30s each side',seconds:60,desc:'Sit cross-legged. Place one hand behind you, other on opposite knee. On each exhale deepen the twist. Works the thoracic spine and unwinds before sleep.'},
  ]
};

const PLAN={
  Monday:{focus:'Chest, triceps & cardio',
    cardio:{gym:{name:'Treadmill intervals',duration:'20 min',seconds:1200,isInterval:true,workSec:60,restSec:60,rounds:8,desc:'Warm up 3 min easy. Alternate 1 min fast run (RPE 8) with 1 min walk ×8. Cool down 3 min.'},
            home:{name:'High knees intervals',duration:'15 min',seconds:900,isInterval:true,workSec:30,restSec:15,rounds:20,desc:'30s high knees at max effort, rest 15s. Repeat for 15 minutes.'}},
    gym:[
      {name:'Barbell bench press',sets:4,reps:'8-10',type:'weight',muscle:'Chest',desc:'Lie flat on bench, grip bar just wider than shoulders. Lower bar to mid-chest with elbows at 45°, press up explosively. Feet flat, back slightly arched, shoulders retracted.'},
      {name:'Incline dumbbell press',sets:3,reps:'10-12',type:'weight',muscle:'Chest',desc:'Set bench to 30-45°. Dumbbells at chest level, elbows slightly tucked. Press up and together at the top. Targets the upper chest.'},
      {name:'Cable fly',sets:3,reps:'12-15',type:'weight',muscle:'Chest',desc:'Stand centered between cables at chest height. Arms slightly bent, sweep together in a wide arc. Squeeze chest at center. Slow eccentric on the way back.'},

      {name:'Overhead tricep extension',sets:3,reps:'10-12',type:'weight',muscle:'Triceps',desc:'Weight overhead, lower behind head bending elbows — keep them pointed forward. Extend fully. Excellent long-head isolation.'}
    ],
    home:[
      {name:'Push-ups',sets:4,reps:'Max',type:'reps',muscle:'Chest',desc:'Hands just wider than shoulders, body straight head to heels. Lower chest to floor, elbows at 45°. Scale by elevating hands (easier) or feet (harder).'},

      {name:'Wide push-ups',sets:3,reps:'12-15',type:'reps',muscle:'Chest',desc:'Hands much wider than shoulders. Lower chest between hands. Shifts emphasis to outer chest.'},
      {name:'Tricep dips (chair)',sets:3,reps:'15',type:'reps',muscle:'Triceps',desc:'Grip sturdy chair edge beside hips. Slide off, bend elbows to lower, straighten back up. Keep back close to chair.'},

  Tuesday:{focus:'Back, biceps & cardio',
    cardio:{gym:{name:'Rowing machine',duration:'20 min',seconds:1200,isInterval:false,desc:'Drive with legs first, lean back, then pull arms. Reverse on recovery. Aim for 20-24 strokes per minute.'},
            home:{name:'Stair climbs / brisk jog',duration:'20 min',seconds:1200,isInterval:false,desc:'Go up and down stairs continuously, or brisk walk with short jog intervals every 2 minutes.'}},
    gym:[
      {name:'Deadlift',sets:4,reps:'5-6',type:'weight',muscle:'Back',desc:'Bar over mid-foot. Hinge at hips, grip shoulder-width. Brace core, flatten back. Drive floor away extending hips and knees together. Bar stays close to body.'},
      {name:'Pull-up / lat pulldown',sets:4,reps:'8-10',type:'weight',muscle:'Back',desc:'Pull-ups: hang overhand, pull chest to bar. Lat pulldown: pull bar to upper chest, elbows drive down and back. Both build a wide back.'},
      {name:'Seated cable row',sets:3,reps:'10-12',type:'weight',muscle:'Back',desc:'Sit upright, pull handle to lower abdomen, torso upright. Squeeze shoulder blades together. Slow return.'},
      {name:'Dumbbell curl',sets:3,reps:'10-12',type:'weight',muscle:'Biceps',desc:'Curl up flexing elbows while supinating wrists to face ceiling at top. Lower slowly. Keep upper arms still.'},
      {name:'Hammer curl',sets:3,reps:'12',type:'weight',muscle:'Biceps',desc:'Palms face each other throughout (neutral grip). Builds brachialis and forearm thickness.'}
    ],
    home:[
      {name:'Bodyweight rows (table edge)',sets:4,reps:'10-12',type:'reps',muscle:'Back',desc:'Lie under a sturdy table, grip edge, body straight. Pull chest up to the edge. More horizontal = harder.'},

// ─── STORAGE HELPERS ──────────────────────────────────────────────────────────
function wkStart(o){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay()+o*7);return d;}
function wkKey(o){return wkStart(o).toISOString().slice(0,10);}
function lk(wk,day,cat,idx){return`${wk}|${day}|${cat}|${idx}`;}
function getLog(day,cat,idx){return JSON.parse(JSON.stringify(logs[lk(wkKey(weekOffset),day,cat,idx)]||{done:false,sets:[]}));}
function getPrev(day,cat,idx){return logs[lk(wkKey(weekOffset-1),day,cat,idx)]||null;}
function setLog(day,cat,idx,data){logs[lk(wkKey(weekOffset),day,cat,idx)]=data;saveData();}
function getDayVal(day,field){return logs[`daily|${wkKey(weekOffset)}|${day}|${field}`]||0;}
function setDayVal(day,field,val){logs[`daily|${wkKey(weekOffset)}|${day}|${field}`]=val;saveData();}

// ─── TIMER ENGINE ─────────────────────────────────────────────────────────────
function timerKey(cat,idx){return`${activeDay}|${cat}|${idx}`;}

function startTimer(cat,idx,totalSec,isInterval,workSec,restSec,rounds){
  stopTimer();
  const key=timerKey(cat,idx);
  timer={id:null,key,remaining:isInterval?workSec:totalSec,total:isInterval?workSec:totalSec,
         isInterval:!!isInterval,phase:'work',round:1,totalRounds:rounds||1,
         workSec:workSec||totalSec,restSec:restSec||0,paused:false};
  tickTimer();
  updateTimerUI(cat,idx);
}

function tickTimer(){
  if(timer.paused)return;
  timer.id=setTimeout(()=>{
    if(timer.paused)return;
    timer.remaining--;
    if(timer.remaining<=0){
      if(timer.isInterval){
        if(timer.phase==='work'&&timer.round<timer.totalRounds){
          timer.phase='rest';
          timer.remaining=timer.restSec;
          timer.total=timer.restSec;
          playBeep(440);
        } else if(timer.phase==='rest'){
          timer.round++;
          if(timer.round>timer.totalRounds){
            timerDone();return;
          }
          timer.phase='work';
          timer.remaining=timer.workSec;
          timer.total=timer.workSec;
          playBeep(880);
        } else {
          timerDone();return;
        }
      } else {
        timerDone();return;
      }
    }
    const[cat,idx]=timer.key.split('|').slice(1);
    updateTimerUI(cat,idx);
    tickTimer();
  },1000);
}

function timerDone(){
  playBeep(660,3);
  const[,cat,idx]=timer.key.split('|');
  timer={id:null,key:null,remaining:0,total:0,isInterval:false,phase:'work',round:0,totalRounds:0,workSec:0,restSec:0,paused:false};
  showToast('Timer complete! ✓');
  updateTimerUI(cat,idx);
}

function stopTimer(){
  if(timer.id){clearTimeout(timer.id);timer.id=null;}
  timer.key=null;timer.remaining=0;timer.paused=false;
}

function pauseResumeTimer(cat,idx){
  if(!timer.key||timer.key!==timerKey(cat,idx))return;
  timer.paused=!timer.paused;
  if(!timer.paused)tickTimer();
  updateTimerUI(cat,idx);
}

function resetTimerUI(cat,idx,totalSec,isInterval,workSec,restSec,rounds){
  stopTimer();
  // re-render just that timer widget
  const wrapId=`timer-wrap-${cat}-${idx}`;
  const wrap=document.getElementById(wrapId);
  if(wrap)wrap.outerHTML=buildTimerHTML(cat,idx,totalSec,isInterval,workSec,restSec,rounds);
}

function updateTimerUI(cat,idx){
  const key=timerKey(cat,idx);
  const active=timer.key===key;
  const wrapId=`timer-wrap-${cat}-${idx}`;
  const el=document.getElementById(wrapId);
  if(!el)return;

  if(!active||timer.remaining===0){
    el.querySelector('.timer-phase').textContent='';
    el.querySelector('.timer-clock').textContent='--:--';
    const bar=el.querySelector('.timer-bar-fill');
    if(bar){bar.style.width='0%';bar.className='timer-bar-fill';}
    const btns=el.querySelector('.timer-controls');
    if(btns)btns.innerHTML=el.dataset.startbtn;
    return;
  }
  const rem=timer.remaining;
  const tot=timer.total;
  const mm=String(Math.floor(rem/60)).padStart(2,'0');
  const ss=String(rem%60).padStart(2,'0');
  el.querySelector('.timer-clock').textContent=`${mm}:${ss}`;
  const phase=el.querySelector('.timer-phase');
  if(timer.paused){phase.textContent='PAUSED';phase.className='timer-phase paused';}
  else{phase.textContent=timer.isInterval?(timer.phase==='work'?'WORK':'REST'):'ACTIVE';
       phase.className=`timer-phase ${timer.isInterval?timer.phase:'work'}`;}
  // bar
  const bar=el.querySelector('.timer-bar-fill');
  if(bar){
    const pct=tot>0?(rem/tot)*100:0;
    bar.style.width=`${pct}%`;
    bar.className='timer-bar-fill'+(timer.phase==='rest'?' rest-phase':'');
  }
  // round info
  if(timer.isInterval){
    const ri=el.querySelector('.ti-round');
    if(ri)ri.textContent=`${timer.round}/${timer.totalRounds}`;
  }
  // buttons
  const btns=el.querySelector('.timer-controls');
  if(btns){
    btns.innerHTML=`
      <button class="timer-btn ${timer.paused?'tbtn-start':'tbtn-pause'}" onclick="pauseResumeTimer('${cat}','${idx}')">${timer.paused?'&#9654; Resume':'&#9208; Pause'}</button>
      <button class="timer-btn tbtn-stop" onclick="stopTimerAndReset('${cat}','${idx}')">&#9209; Stop</button>`;
  }
}

function stopTimerAndReset(cat,idx){
  const wrapId=`timer-wrap-${cat}-${idx}`;
  const el=document.getElementById(wrapId);
  stopTimer();
  if(el){
    el.querySelector('.timer-phase').textContent='';
    el.querySelector('.timer-clock').textContent='--:--';
    const bar=el.querySelector('.timer-bar-fill');
    if(bar){bar.style.width='0%';bar.className='timer-bar-fill';}
    const btns=el.querySelector('.timer-controls');
    if(btns)btns.innerHTML=el.dataset.startbtn;
  }
}

function buildTimerHTML(cat,idx,totalSec,isInterval,workSec,restSec,rounds){
  const startBtn=isInterval
    ?`<button class="timer-btn tbtn-start" onclick="startTimer('${cat}','${idx}',${totalSec},true,${workSec},${restSec},${rounds})">&#9654; Start intervals</button>`
    :`<button class="timer-btn tbtn-start" onclick="startTimer('${cat}','${idx}',${totalSec},false,${totalSec},0,1)">&#9654; Start timer</button>`;
  const mm=String(Math.floor(totalSec/60)).padStart(2,'0');
  const ss=String(totalSec%60).padStart(2,'0');
  let intervalInfo='';
  if(isInterval){
    const wm=String(Math.floor(workSec/60)).padStart(2,'0'),ws=String(workSec%60).padStart(2,'0');
    const rm2=String(Math.floor(restSec/60)).padStart(2,'0'),rs=String(restSec%60).padStart(2,'0');
    intervalInfo=`<div class="timer-interval-info">
      <div class="tii-box"><div class="tii-label">Work</div><div class="tii-val" style="color:var(--green-text)">${wm}:${ws}</div></div>
      <div class="tii-box"><div class="tii-label">Rest</div><div class="tii-val" style="color:var(--orange-text)">${rm2}:${rs}</div></div>
      <div class="tii-box"><div class="tii-label">Round</div><div class="tii-val ti-round">&#8212;/${rounds}</div></div>
    </div>`;
  }
  const safeBtn=startBtn.replace(/"/g,"'");
  return`<div class="timer-wrap" id="timer-wrap-${cat}-${idx}" data-startbtn="${safeBtn}">
    <div class="timer-display">
      <div class="timer-top-row">
        <div class="timer-clock">${mm}:${ss}</div>
        <div class="timer-phase"></div>
      </div>
      <div class="timer-bar-wrap"><div class="timer-bar-fill" style="width:0%"></div></div>
    </div>
    ${intervalInfo}
    <div class="timer-controls">${startBtn}</div>
  </div>`;
}

function playBeep(freq,times=1){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    let t=ac.currentTime;
    for(let i=0;i<times;i++){
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=freq;g.gain.setValueAtTime(.3,t);
      o.start(t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.stop(t+.25);
      t+=.3;
    }
  }catch(e){}
}

// ─── CALENDAR ─────────────────────────────────────────────────────────────────
let calYear=null, calMonth=null;

function openCalendar(){
  const now=new Date();
  // anchor cal view on currently selected date's week if possible
  if(activeDay){
    const base=wkStart(weekOffset);
    const dayIdx=DAYS.indexOf(activeDay);
    const selDate=new Date(base);selDate.setDate(base.getDate()+dayIdx);
    calYear=selDate.getFullYear();calMonth=selDate.getMonth();
  } else {
    calYear=now.getFullYear();calMonth=now.getMonth();
  }
  renderCalModal();
}

function closeCalendar(){
  const m=document.getElementById('cal-modal');
  m.style.display='none';m.innerHTML='';
}

function calNavMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalModal();
}

function calSelectDate(year,month,day){
  // Figure out which week offset this date falls in
  const clicked=new Date(year,month,day);
  clicked.setHours(0,0,0,0);
  const todayBase=wkStart(0); // Sunday of current week
  const diffMs=clicked.getTime()-todayBase.getTime();
  const diffWeeks=Math.floor(diffMs/(7*24*60*60*1000));
  weekOffset=diffWeeks;
  activeDay=DAYS[clicked.getDay()];
  completedOpen={stretch_morning:false,stretch_evening:false,cardio:false,strength:false};
  incompleteOpen={stretch_morning:true,stretch_evening:true,cardio:true,strength:true};
  stopTimer();
  closeCalendar();
  renderWorkoutPage();
  // Scroll to top of page smoothly
  document.getElementById('page-workout').scrollTo({top:0,behavior:'smooth'});
}

function renderCalModal(){
  const m=document.getElementById('cal-modal');
  m.style.display='block';
  const today=new Date();today.setHours(0,0,0,0);
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];

  // Determine selected date from current activeDay + weekOffset
  let selDateStr='';
  if(activeDay){
    const base=wkStart(weekOffset);
    const dayIdx=DAYS.indexOf(activeDay);
    const sd=new Date(base);sd.setDate(base.getDate()+dayIdx);
    selDateStr=sd.toISOString().slice(0,10);
  }

  // Build grid
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const startDow=firstDay.getDay(); // 0=Sun
  // Fill weeks
  let weeks=[];
  let week=[];
  // Pad start
  for(let p=0;p<startDow;p++){
    const d=new Date(calYear,calMonth,1-startDow+p);
    week.push({date:d,otherMonth:true});
  }
  for(let d=1;d<=lastDay.getDate();d++){
    const date=new Date(calYear,calMonth,d);
    week.push({date,otherMonth:false});
    if(week.length===7){weeks.push(week);week=[];}
  }
  // Pad end
  if(week.length>0){
    while(week.length<7){
      const last=week[week.length-1].date;
      const nd=new Date(last);nd.setDate(nd.getDate()+1);
      week.push({date:nd,otherMonth:true});
    }
    weeks.push(week);
  }

  let gridHtml='<div class="cal-dow-row">';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{gridHtml+=`<div class="cal-dow">${d}</div>`;});
  gridHtml+='</div><div class="cal-weeks">';
  weeks.forEach(wk=>{
    gridHtml+='<div class="cal-week-row">';
    wk.forEach(({date,otherMonth})=>{
      const dStr=date.toISOString().slice(0,10);
      const isToday=date.getTime()===today.getTime();
      const isSel=dStr===selDateStr;
      // Check if any data logged for this date
      const wKey=wkKey_forDate(date);
      const dayName=DAYS[date.getDay()];
      const hasData=checkHasData(wKey,dayName);
      let cls='cal-day';
      if(otherMonth)cls+=' other-month';
      if(isToday&&!isSel)cls+=' today-cal';
      if(isSel)cls+=' selected-cal';
      if(hasData&&!isSel)cls+=' has-data';
      gridHtml+=`<div class="${cls}" onclick="calSelectDate(${date.getFullYear()},${date.getMonth()},${date.getDate()})">
        <div class="cd-num">${date.getDate()}</div>
        ${hasData&&!isSel?'<div class="cd-dot"></div>':''}
      </div>`;
    });
    gridHtml+='</div>';
  });
  gridHtml+='</div>';

  m.innerHTML=`<div class="cal-overlay" onclick="closeCalendar()">
    <div class="cal-sheet" onclick="event.stopPropagation()">
      <div class="cal-handle"></div>
      <div class="cal-header">
        <h2>Calendar</h2>
        <button class="cal-close" onclick="closeCalendar()">&#10005;</button>
      </div>
      <div class="cal-month-nav">
        <button onclick="calNavMonth(-1)">&#8592;</button>
        <div class="cal-month-label">${monthNames[calMonth]} ${calYear}</div>
        <button onclick="calNavMonth(1)">&#8594;</button>
      </div>
      <div class="cal-grid">${gridHtml}</div>
      <div style="padding:0 16px 16px;display:flex;gap:10px;align-items:center;font-size:12px;color:var(--text3);">
        <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span>Has workout data</span>
        <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:var(--blue);display:inline-block"></span>Selected</span>
        <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:var(--blue-bg);display:inline-block"></span>Today</span>
      </div>
    </div>
  </div>`;
}

function wkKey_forDate(date){
  const d=new Date(date);d.setHours(0,0,0,0);
  // Sunday of that date's week
  d.setDate(d.getDate()-d.getDay());
  return d.toISOString().slice(0,10);
}

function checkHasData(wKey,dayName){
  // Check steps, water, weight, or any exercise/cardio done
  if(logs[`daily|${wKey}|${dayName}|steps`]) return true;
  if(logs[`daily|${wKey}|${dayName}|water`]) return true;
  if(logs[`daily|${wKey}|${dayName}|weight_morning`]) return true;
  if(logs[`daily|${wKey}|${dayName}|weight_evening`]) return true;
  const plan=PLAN[dayName];
  if(!plan)return false;
  const exs=plan.gym||[];
  for(let i=0;i<exs.length;i++){if(logs[lk(wKey,dayName,'ex',i)])return true;}
  if(logs[lk(wKey,dayName,'cardio',0)])return true;
  return false;
}

// ─── STRETCH LIST ─────────────────────────────────────────────────────────────
function buildStretchList(period,doneCount){
  const items=STRETCHES[period];
  const active=[],done=[];
  items.forEach((s,i)=>{
    const log=getLog(activeDay,'stretch_'+period,i);
    (log.done?done:active).push({s,i,log});
  });
  let rows='<div style="padding:0 16px 4px">';
  active.forEach(({s,i})=>{
    rows+=`<div class="stretch-item">
      <button class="stretch-done-btn" onclick="toggleStretch('${period}',${i})"></button>
      <div class="stretch-info">
        <div class="stretch-name">${s.name}</div>
        <div class="stretch-meta">${s.duration}</div>
        <div class="stretch-desc">${s.desc}</div>
        ${buildTimerHTML('stretch_'+period,String(i),s.seconds,false,s.seconds,0,1)}
      </div>
    </div>`;
  });
  rows+='</div>';
  const incHtml=buildIncompleteSection('stretch_'+period,rows,active.length,items.length,true);
  const doneHtml=buildCompletedSection('stretch_'+period,done.map(({s,i})=>({name:s.name,type:'stretch_'+period,idx:i})),true);
  return incHtml+doneHtml;
}

// ─── COLLAPSIBLE SECTION HELPERS ─────────────────────────────────────────────
function buildIncompleteSection(sectionKey,innerHtml,count,total,isStretch){
  const open=incompleteOpen[sectionKey]!==false;
  const wrap=isStretch?'':'<div style="margin:0 12px;">';
  const wrapEnd=isStretch?'':'</div>';
  if(count===0)return`${wrap}
    <button class="section-toggle open" onclick="toggleIncomplete('${sectionKey}')">
      <span class="st-label">Incomplete</span>
      <div class="st-right"><span class="st-count st-count-inc">0 left</span><span class="st-arrow">&#9662;</span></div>
    </button>
    <div class="section-list open" style="padding:8px 0 4px;text-align:center;color:var(--text3);font-size:13px;">All done! &#10003;</div>
  ${wrapEnd}`;
  return`${wrap}
    <button class="section-toggle${open?' open':''}" onclick="toggleIncomplete('${sectionKey}')">
      <span class="st-label">Incomplete</span>
      <div class="st-right"><span class="st-count st-count-inc">${count} left</span><span class="st-arrow">&#9662;</span></div>
    </button>
    <div class="section-list${open?' open':''}">${innerHtml}</div>
  ${wrapEnd}`;
}

function buildCompletedSection(sectionKey,items,isStretch){
  if(items.length===0)return'';
  const open=completedOpen[sectionKey]?'open':'';
  let list='';
  items.forEach(({name,type,idx})=>{
    list+=`<div class="completed-item">
      <div class="ci-header">
        <span class="ci-check">&#10003;</span>
        <span class="ci-name">${name}</span>
        <button class="ci-undo" onclick="undoDone('${type}',${idx})">Undo</button>
      </div>
    </div>`;
  });
  const wrap=isStretch?'':'<div style="margin:0 12px;">';
  const wrapEnd=isStretch?'':'</div>';
  return`${wrap}<div class="completed-section">
    <button class="section-toggle${open?' open':''}" onclick="toggleCompleted('${sectionKey}')">
      <span class="st-label">Completed</span>
      <div class="st-right"><span class="st-count st-count-done">${items.length} done</span><span class="st-arrow">&#9662;</span></div>
    </button>
    <div class="section-list${open?' open':''}">${list}</div>
  </div>${wrapEnd}`;
}

function toggleIncomplete(key){incompleteOpen[key]=!incompleteOpen[key];renderDayDetail();}
function toggleCompleted(key){completedOpen[key]=!completedOpen[key];renderDayDetail();}

function undoDone(type,idx){
  if(type.startsWith('stretch_')){
    const period=type.replace('stretch_','');
    const l=getLog(activeDay,'stretch_'+period,idx);
    l.done=false;setLog(activeDay,'stretch_'+period,idx,l);
  } else if(type==='cardio'){
    const l=getLog(activeDay,'cardio',idx);
    l.done=false;setLog(activeDay,'cardio',idx,l);
  } else {
    const l=getLog(activeDay,'ex',idx);
    l.done=false;setLog(activeDay,'ex',idx,l);
  }
  renderDayDetail();
}

// ─── EXERCISE CARD ────────────────────────────────────────────────────────────
function buildExCard(ex,i,log,isDone){
  const prev=getPrev(activeDay,'ex',i);
  let prevTip='';
  if(prev&&prev.sets&&prev.sets[0]){
    const ps=prev.sets[0];
    if(ex.type==='weight'&&ps.weight)prevTip=`${ps.weight} ${wLabel()}`;
    else if(ex.type==='time'&&ps.time)prevTip=`${ps.time}min`;
    else if(ex.type==='reps'&&ps.reps)prevTip=`${ps.reps} reps`;
  }
  let setRows='';
  for(let s=0;s<ex.sets;s++){
    const sv=(log.sets&&log.sets[s])||{};
    if(ex.type==='weight'){
      setRows+=`<div class="set-row"><span class="set-num">Set ${s+1}</span>
        <input type="number" value="${sv.weight||''}" placeholder="${wLabel()}" min="0" step="2.5" onchange="saveSet(${i},${s},'weight',this)">
        <span class="set-label">${wLabel()}</span>
        <input type="number" value="${sv.reps||''}" placeholder="${ex.reps}" min="0" onchange="saveSet(${i},${s},'reps',this)">
        <span class="set-label">reps</span></div>`;
    } else if(ex.type==='time'){
      setRows+=`<div class="set-row"><span class="set-num">Set ${s+1}</span>
        <input type="number" value="${sv.time||''}" placeholder="min" min="0" step="0.5" onchange="saveSet(${i},${s},'time',this)">
        <span class="set-label">min</span></div>`;
    } else {
      setRows+=`<div class="set-row"><span class="set-num">Set ${s+1}</span>
        <input type="number" value="${sv.reps||''}" placeholder="${ex.reps}" min="0" onchange="saveSet(${i},${s},'reps',this)">
        <span class="set-label">reps</span></div>`;
    }
  }
  const hasTimer=ex.type==='time'&&ex.seconds;
  return`<div class="ex-card${isDone?' is-done':''}">
    <div class="ex-header">
      <div class="ex-name">${ex.name}${prevTip?`<span class="prev-tip">Last: ${prevTip}</span>`:''}<span class="badge badge-amber">${ex.muscle}</span></div>
      <div class="ex-meta">${ex.sets} sets × ${ex.reps}</div>
    </div>
    <div class="ex-body">
      <div class="ex-desc">${ex.desc}</div>
      ${hasTimer?buildTimerHTML('ex',String(i),ex.seconds,false,ex.seconds,0,1):''}
      <div class="sets-grid">${setRows}</div>
      <textarea class="note" id="note-${i}" placeholder="Notes..." onchange="saveNote(${i})">${log.note||''}</textarea>
      <div class="done-row"><button class="done-btn" onclick="toggleDone('ex',${i})">Mark done</button></div>
    </div>
  </div>`;
}

// ─── LOG ACTIONS ──────────────────────────────────────────────────────────────
function addDaily(field,inputId){
  const el=document.getElementById(inputId);const val=parseFloat(el.value)||0;
  if(val<=0)return;
  setDayVal(activeDay,field,getDayVal(activeDay,field)+val);el.value='';
  showToast(`+${val} ${field==='steps'?'steps':fLabel()} logged`);renderDayDetail();
}
function subDaily(field,inputId){
  const el=document.getElementById(inputId);const val=parseFloat(el.value)||0;
  if(val<=0)return;
  setDayVal(activeDay,field,Math.max(0,getDayVal(activeDay,field)-val));el.value='';
  showToast(`−${val} ${field==='steps'?'steps':fLabel()} removed`);renderDayDetail();
}
function resetDaily(field){
  if(confirm(`Reset ${field} to 0?`)){setDayVal(activeDay,field,0);showToast(`${field} reset`);renderDayDetail();}
}
function saveWeight(period){
  const val=parseFloat(document.getElementById('w-'+period).value)||0;
  if(val>0){setDayVal(activeDay,'weight_'+period,val);showToast('Weight saved');renderDayDetail();}
}
function resetWeight(period){setDayVal(activeDay,'weight_'+period,0);showToast('Weight cleared');renderDayDetail();}
function saveCardioTime(){const l=getLog(activeDay,'cardio',0);const el=document.getElementById('cardio-time');if(el)l.time=el.value;setLog(activeDay,'cardio',0,l);}
function saveCardioNote(){const l=getLog(activeDay,'cardio',0);const el=document.getElementById('cardio-note');if(el)l.note=el.value;setLog(activeDay,'cardio',0,l);}
function saveSet(exIdx,setIdx,field,el){
  const l=getLog(activeDay,'ex',exIdx);
  if(!l.sets)l.sets=[];while(l.sets.length<=setIdx)l.sets.push({});
  l.sets[setIdx]={...l.sets[setIdx],[field]:el.value};setLog(activeDay,'ex',exIdx,l);
}
function saveNote(exIdx){const l=getLog(activeDay,'ex',exIdx);const el=document.getElementById('note-'+exIdx);if(el)l.note=el.value;setLog(activeDay,'ex',exIdx,l);}

function toggleDone(cat,idx){
  if(cat==='cardio'){
    const l=getLog(activeDay,'cardio',idx);l.done=true;setLog(activeDay,'cardio',idx,l);
  } else {
    const l=getLog(activeDay,'ex',idx);l.done=true;setLog(activeDay,'ex',idx,l);
  }
  showToast('Moved to completed ✓');renderDayDetail();
}
function toggleStretch(period,idx){
  const l=getLog(activeDay,'stretch_'+period,idx);
  l.done=!l.done;setLog(activeDay,'stretch_'+period,idx,l);
  showToast(l.done?'Stretch done ✓':'Unmarked');renderDayDetail();
}

// ─── STATS PAGE ───────────────────────────────────────────────────────────────
function renderStatsPage(){
  const pg=document.getElementById('page-stats');
  let html=`<div class="page-header"><h1>Progress</h1><div class="sub">Your workout history</div></div>`;
  let hasData=false,weeksHtml='<div class="stats-week-list">';
  for(let o=0;o>=-4;o--){
    const wk=wkKey(o),base=wkStart(o);
    let rows='';
    DAYS.forEach((day,i)=>{
      const date=new Date(base);date.setDate(date.getDate()+i);
      const plan=PLAN[day],exs=plan.gym||[];
      let doneCt=0;
      exs.forEach((_,ei)=>{if(logs[lk(wk,day,'ex',ei)]?.done)doneCt++;});
      const cDone=logs[lk(wk,day,'cardio',0)]?.done;
      const total=exs.length+1;
      const steps=logs[`daily|${wk}|${day}|steps`]||0;
      const water=logs[`daily|${wk}|${day}|water`]||0;
      const wm=logs[`daily|${wk}|${day}|weight_morning`]||'';
      const we=logs[`daily|${wk}|${day}|weight_evening`]||'';
      if(doneCt>0||steps>0||water>0||wm||we){
        hasData=true;
        const isFull=doneCt+(cDone?1:0)>=total;
        rows+=`<div class="stats-day-row">
          <div><div class="sd-day">${SHORT[i]} ${date.getDate()}</div><div style="font-size:11px;color:var(--text3)">${plan.focus.split('&')[0].trim()}</div></div>
          <div class="sd-vals">
            ${steps>0?`<span>${Number(steps).toLocaleString()} steps</span>`:''}
            ${water>0?`<span>${Math.round(water)} ${fLabel()}</span>`:''}
            ${wm?`<span>AM: ${wm} ${wLabel()}</span>`:''}
            ${we?`<span>PM: ${we} ${wLabel()}</span>`:''}
          </div>
          <div class="sd-done${isFull?' full':''}">${doneCt+(cDone?1:0)}/${total}</div>
        </div>`;
      }
    });
    if(rows) weeksHtml+=`<div class="stats-week"><div class="stats-week-head">${weekLabel(o)}</div>${rows}</div>`;
  }
  weeksHtml+='</div>';
  if(!hasData)weeksHtml='<div class="no-data">No data yet — complete some workouts to see progress here.</div>';
  pg.innerHTML=html+weeksHtml;
}

// ── Collect data helpers ──────────────────────────────────────────────────────
function getDaysBack(n){
  const arr=[];
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=n-1;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    arr.push(d);
  }
  return arr;
}
function dateToWkKeyAndDay(date){
  const d=new Date(date);d.setHours(0,0,0,0);
  const sun=new Date(d);sun.setDate(d.getDate()-d.getDay());
  return{wk:sun.toISOString().slice(0,10),day:DAYS[d.getDay()]};
}
function shortDateLabel(date,range){
  if(range<=14)return date.toLocaleDateString('en-US',{month:'numeric',day:'numeric'});
  if(range<=90)return date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return date.toLocaleDateString('en-US',{month:'short',year:'2-digit'});
}

// ── SVG chart builder ─────────────────────────────────────────────────────────
function buildLineChart(container,series,opts){
  // series = [{label,color,points:[{x,y,date,raw}]}]
  // opts = {yLabel,yGoal,barMode,goalColor}
  const W=container.clientWidth||320;
  const H=180, PL=46, PR=12, PT=16, PB=36;
  const cW=W-PL-PR, cH=H-PT-PB;

  // Collect all y values
  let allY=[];
  series.forEach(s=>s.points.forEach(p=>{if(p.y!=null)allY.push(p.y);}));
  if(opts.yGoal)allY.push(opts.yGoal);

  if(allY.length===0){
    container.innerHTML=`<div class="graph-empty">No data yet for this range.<br>Start logging to see your progress!</div>`;
    return;
  }

  const yMin=Math.max(0,Math.min(...allY)*0.92);
  const yMax=Math.max(...allY)*1.08;
  const yRange=yMax-yMin||1;

  const allX=series[0]?.points.map((_,i)=>i)||[];
  const xCount=series[0]?.points.length||1;

  function cx(i){return PL+((i/(xCount-1||1))*cW);}
  function cy(v){return PT+cH-(((v-yMin)/yRange)*cH);}

  let svg=`<svg class="graph-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Grid lines + y labels
  const yTicks=4;
  for(let t=0;t<=yTicks;t++){
    const v=yMin+(yRange/yTicks)*t;
    const y=cy(v);
    svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="var(--border)" stroke-width="0.8"/>`;
    svg+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="10" fill="var(--text3)" font-family="-apple-system,sans-serif">${Math.round(v)}</text>`;
  }

  // Goal line
  if(opts.yGoal){
    const gy=cy(opts.yGoal);
    svg+=`<line x1="${PL}" y1="${gy}" x2="${W-PR}" y2="${gy}" stroke="${opts.goalColor||'var(--blue)'}" stroke-width="1.2" stroke-dasharray="4 3"/>`;
    svg+=`<text x="${W-PR}" y="${gy-3}" text-anchor="end" font-size="9" fill="${opts.goalColor||'var(--blue)'}" font-family="-apple-system,sans-serif">goal</text>`;
  }

  // X axis labels — pick ~6 evenly spaced
  const labelStep=Math.max(1,Math.floor(xCount/6));
  series[0]?.points.forEach((p,i)=>{
    if(i%labelStep===0||i===xCount-1){
      const x=cx(i);
      svg+=`<text x="${x}" y="${H-4}" text-anchor="middle" font-size="9" fill="var(--text3)" font-family="-apple-system,sans-serif">${p.label||''}</text>`;
    }
  });

  // Bar mode (steps)
  if(opts.barMode){
    const barW=Math.max(2,Math.min(18,(cW/xCount)*0.7));
    series[0].points.forEach((p,i)=>{
      if(p.y==null)return;
      const x=cx(i);const top=cy(p.y);const bot=cy(yMin);
      const barColor=p.y>=goals.steps?'var(--green)':'var(--blue)';
      svg+=`<rect x="${x-barW/2}" y="${top}" width="${barW}" height="${bot-top}" fill="${barColor}" rx="2" opacity="0.85"
        onmouseover="showTip(event,'${p.label}: ${p.raw.toLocaleString()} steps')"
        onmouseleave="hideTip()" ontouchstart="showTip(event,'${p.label}: ${p.raw.toLocaleString()} steps')" style="cursor:pointer"/>`;
    });
  } else {
    // Line + fill + dots per series
    series.forEach(s=>{
      const pts=s.points.filter(p=>p.y!=null);
      if(pts.length===0)return;
      const idxMap=new Map(s.points.map((p,i)=>[p,i]));

      // Filled area path
      let area=`M ${cx(idxMap.get(pts[0]))} ${cy(pts[0].y)}`;
      for(let i=1;i<pts.length;i++){
        const xi=cx(idxMap.get(pts[i]));const yi=cy(pts[i].y);
        const pxi=cx(idxMap.get(pts[i-1]));const pyi=cy(pts[i-1].y);
        const cpx=(pxi+xi)/2;
        area+=` C ${cpx} ${pyi} ${cpx} ${yi} ${xi} ${yi}`;
      }
      const lastI=idxMap.get(pts[pts.length-1]);
      const firstI=idxMap.get(pts[0]);
      area+=` L ${cx(lastI)} ${cy(yMin)} L ${cx(firstI)} ${cy(yMin)} Z`;
      svg+=`<path d="${area}" fill="${s.color}" opacity="0.12"/>`;

      // Line
      let line=`M ${cx(idxMap.get(pts[0]))} ${cy(pts[0].y)}`;
      for(let i=1;i<pts.length;i++){
        const xi=cx(idxMap.get(pts[i]));const yi=cy(pts[i].y);
        const pxi=cx(idxMap.get(pts[i-1]));const pyi=cy(pts[i-1].y);
        const cpx=(pxi+xi)/2;
        line+=` C ${cpx} ${pyi} ${cpx} ${yi} ${xi} ${yi}`;
      }
      svg+=`<path d="${line}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linecap="round"/>`;

      // Dots
      pts.forEach(p=>{
        const i=idxMap.get(p);
        const tip=`${p.label}: ${p.raw} ${opts.yLabel||''}`;
        svg+=`<circle cx="${cx(i)}" cy="${cy(p.y)}" r="4" fill="${s.color}" stroke="var(--bg)" stroke-width="1.5"
          onmouseover="showTip(event,'${tip}')" onmouseleave="hideTip()"
          ontouchstart="showTip(event,'${tip}')" style="cursor:pointer"/>`;
      });
    });
  }

  svg+=`</svg>`;
  container.innerHTML=svg;
}

// ── Individual chart drawers ───────────────────────────────────────────────────
function drawWeightChart(){
  const days=getDaysBack(graphState.weightRange);
  const mPts=[],ePts=[];
  days.forEach(d=>{
    const{wk,day}=dateToWkKeyAndDay(d);
    const lbl=shortDateLabel(d,graphState.weightRange);
    const am=parseFloat(logs[`daily|${wk}|${day}|weight_morning`])||null;
    const pm=parseFloat(logs[`daily|${wk}|${day}|weight_evening`])||null;
    mPts.push({y:am,label:lbl,raw:am||'—'});
    ePts.push({y:pm,label:lbl,raw:pm||'—'});
  });
  const cont=document.getElementById('chart-weight');
  if(!cont)return;
  buildLineChart(cont,[
    {label:'Morning',color:'#6366f1',points:mPts},
    {label:'Evening',color:'#f59e0b',points:ePts}
  ],{yLabel:wLabel()});
}

function drawStepsChart(){
  const days=getDaysBack(graphState.stepsRange);
  const pts=[];
  days.forEach(d=>{
    const{wk,day}=dateToWkKeyAndDay(d);
    const lbl=shortDateLabel(d,graphState.stepsRange);
    const s=parseFloat(logs[`daily|${wk}|${day}|steps`])||null;
    pts.push({y:s,label:lbl,raw:s||0});
  });
  const cont=document.getElementById('chart-steps');
  if(!cont)return;
  buildLineChart(cont,[
    {label:'Steps',color:'var(--blue)',points:pts}
  ],{yLabel:'steps',barMode:true,yGoal:goals.steps,goalColor:'var(--green)'});
}

function drawCalChart(){
  const days=getDaysBack(graphState.calRange);
  const calGoal=getMealCalorieGoal();
  const pts=[];
  days.forEach(d=>{
    const lbl=shortDateLabel(d,graphState.calRange);
    const val=getDayCalories(d);
    pts.push({y:val||null,label:lbl,raw:val||0});
  });
  const cont=document.getElementById('chart-cal');
  if(!cont)return;
  buildLineChart(cont,[{label:'Calories',color:'var(--orange)',points:pts}],
    {yLabel:'kcal',barMode:true,yGoal:calGoal,goalColor:'var(--red)'});
}

function drawExChart(){
  if(!graphState.exName)return;
  const days=getDaysBack(graphState.exRange);
  const metric=graphState.exMetric;
  // Find which day+plan this exercise appears in
  const pts=[];
  days.forEach(d=>{
    const{wk,day}=dateToWkKeyAndDay(d);
    const lbl=shortDateLabel(d,graphState.exRange);
    // Search gym then home for this exercise
    let val=null;
    ['gym','home'].forEach(m=>{
      const plan=PLAN[day];if(!plan)return;
      (plan[m]||[]).forEach((ex,ei)=>{
        if(ex.name!==graphState.exName)return;
        const log=logs[lk(wk,day,'ex',ei)];
        if(!log||!log.sets)return;
        // Average across sets that have data
        const vals=log.sets.map(sv=>parseFloat(sv[metric])||null).filter(v=>v!=null);
        if(vals.length>0){
          val=Math.max(...vals); // use best set
        }
      });
    });
    pts.push({y:val,label:lbl,raw:val||'—'});
  });
  const cont=document.getElementById('chart-ex');
  if(!cont)return;
  const metricLabel=metric==='weight'?wLabel():metric==='reps'?'reps':'min';
  const color=metric==='weight'?'var(--purple)':metric==='reps'?'var(--green)':'var(--orange)';
  buildLineChart(cont,[
    {label:graphState.exName,color,points:pts}
  ],{yLabel:metricLabel});
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
function showTip(e,text){
  const t=document.getElementById('tooltip');
  t.textContent=text;t.style.display='block';
  const x=e.touches?e.touches[0].clientX:e.clientX;
  const y=e.touches?e.touches[0].clientY:e.clientY;
  t.style.left=Math.min(x+10,window.innerWidth-120)+'px';
  t.style.top=(y-36)+'px';
}
function hideTip(){document.getElementById('tooltip').style.display='none';}

const MEAL_TYPES=['Breakfast','Lunch','Dinner','Snacks'];

// Custom foods & recipes stored in localStorage
let customFoods=[]; // [{id,name,cals,protein,carbs,fat,serving}]
let customRecipes=[]; // [{id,name,description,cals,protein,carbs,fat,serves,ingredients}]

function loadMealsData(){
  try{customFoods=JSON.parse(localStorage.getItem('wt_custom_foods')||'[]');}catch(e){customFoods=[];}
  try{customRecipes=JSON.parse(localStorage.getItem('wt_custom_recipes')||'[]');}catch(e){customRecipes=[];}
}
function saveMealsData(){
  try{localStorage.setItem('wt_custom_foods',JSON.stringify(customFoods));}catch(e){}
  try{localStorage.setItem('wt_custom_recipes',JSON.stringify(customRecipes));}catch(e){}
}

function mealsDateKey(offset){
  const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+offset);
  return d.toISOString().slice(0,10);
}
function mealsDateLabel(offset){
  if(offset===0)return'Today';
  if(offset===-1)return'Yesterday';
  if(offset===1)return'Tomorrow';
  const d=new Date();d.setDate(d.getDate()+offset);
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function mealsDayName(offset){
  const d=new Date();d.setDate(d.getDate()+offset);
  return DAYS[d.getDay()];
}

// Meal log key: meal_log|dateKey|mealType|itemIdx
function mealLogKey(dateKey,mealType,idx){return`meal_log|${dateKey}|${mealType}|${idx}`;}
function getMealCheck(dateKey,mealType,idx){return logs[mealLogKey(dateKey,mealType,idx)]||false;}
function setMealCheck(dateKey,mealType,idx,val){logs[mealLogKey(dateKey,mealType,idx)]=val;saveData();}

// Custom logged foods key: meal_custom|dateKey|mealType (array)
function getCustomMealFoods(dateKey,mealType){
  try{return JSON.parse(localStorage.getItem(`meal_custom|${dateKey}|${mealType}`)||'[]');}catch(e){return[];}
}
function setCustomMealFoods(dateKey,mealType,arr){
  try{localStorage.setItem(`meal_custom|${dateKey}|${mealType}`,JSON.stringify(arr));}catch(e){}
}

function getMealCalorieGoal(){return parseInt(localStorage.getItem('wt_cal_goal')||'2000');}
function setMealCalorieGoal(v){localStorage.setItem('wt_cal_goal',String(v));}

function renderMealsPage(){
  const pg=document.getElementById('page-meals');
  const dateKey=mealsDateKey(mealsDateOffset);
  const dayName=mealsDayName(mealsDateOffset);
  const plan=DEFAULT_DIET_PLAN[dayName]||DEFAULT_DIET_PLAN['Monday'];
  const calGoal=getMealCalorieGoal();

  // Calculate totals
  let totalCals=0,totalProtein=0,totalCarbs=0,totalFat=0;
  MEAL_TYPES.forEach(mt=>{
    const items=plan[mt]||[];
    items.forEach((item,i)=>{
      if(getMealCheck(dateKey,mt,`plan_${i}`)){
        totalCals+=item.cals;totalProtein+=item.protein;totalCarbs+=item.carbs;totalFat+=item.fat;
      }
    });
    const custom=getCustomMealFoods(dateKey,mt);
    custom.forEach(f=>{
      if(f.checked){totalCals+=f.cals||0;totalProtein+=f.protein||0;totalCarbs+=f.carbs||0;totalFat+=f.fat||0;}
    });
  });

  const pct=Math.min(100,Math.round((totalCals/calGoal)*100));
  const rem=calGoal-totalCals;
  const circumference=2*Math.PI*36;
  const dashOffset=circumference*(1-pct/100);
  const ringColor=totalCals>calGoal?'var(--red)':'var(--green)';

  let html=`
  <div class="meals-header">
    <div>

      <div class="sub">${mealsDateLabel(mealsDateOffset)}</div>

  <div class="meals-day-nav">

    <div class="mdl">${mealsDateLabel(mealsDateOffset)} &mdash; ${dayName}</div>

    <button onclick="mealsDateOffset++;renderMealsPage()">&#8594;</button>

    <div class="calorie-summary">
      <div class="calorie-ring">
        <svg width="88" height="88" viewBox="0 0 88 88">
          <circle cx="44" cy="44" r="36" fill="none" stroke="var(--bg3)" stroke-width="7"/>
          <circle cx="44" cy="44" r="36" fill="none" stroke="${ringColor}" stroke-width="7"
            stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}"
            stroke-linecap="round" transform="rotate(-90 44 44)" style="transition:stroke-dashoffset .4s"/>
          <text x="44" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="var(--text)" font-family="-apple-system,sans-serif">${totalCals}</text>
          <text x="44" y="54" text-anchor="middle" font-size="9" fill="var(--text3)" font-family="-apple-system,sans-serif">kcal eaten</text>
        </svg>
      </div>
      <div class="calorie-stats">
        <div class="cal-stat-row"><span class="cal-stat-label">Goal</span><span class="cal-stat-val">${calGoal} kcal</span></div>
        <div class="cal-stat-row"><span class="cal-stat-label">${rem>=0?'Remaining':'Over by'}</span><span class="cal-stat-val ${rem<0?'over':'under'}">${Math.abs(rem)} kcal</span></div>
        <div class="cal-stat-row"><span class="cal-stat-label">Progress</span><span class="cal-stat-val">${pct}%</span></div>
      </div>
    </div>
    <div class="macro-row">
      <div class="macro-box"><div class="macro-label">Protein</div><div class="macro-val" style="color:var(--blue-text)">${totalProtein}g</div></div>
      <div class="macro-box"><div class="macro-label">Carbs</div><div class="macro-val" style="color:var(--amber-text)">${totalCarbs}g</div></div>
      <div class="macro-box"><div class="macro-label">Fat</div><div class="macro-val" style="color:var(--red-text)">${totalFat}g</div></div>
    </div>
  </div>`;

  // Meal sections
  const cheatNote=plan.cheatNote;
  if(cheatNote){
    html+=`<div style="margin:12px 12px 0;background:var(--amber-bg);border-radius:var(--r);padding:12px 16px;border-left:4px solid var(--amber);">
      <div style="font-size:13px;font-weight:600;color:var(--amber-text);margin-bottom:4px;">&#9732; Shabbat</div>
      <div style="font-size:13px;color:var(--amber-text);line-height:1.5">${cheatNote}</div>
    </div>`;
  }
  html+=`<div style="margin:10px 12px 0;background:var(--bg2);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--text2);">
    <strong>General rules:</strong> Drink water, diet drinks, coffee, tea. 1 snack per day. Still hungry? Eat more vegetables first.
  </div>`;

  MEAL_TYPES.forEach(mt=>{
    const items=plan[mt]||[];
    const custom=getCustomMealFoods(dateKey,mt);
    let mealCals=0;
    items.forEach((item,i)=>{if(!item.cheat&&getMealCheck(dateKey,mt,`plan_${i}`))mealCals+=item.cals;});
    custom.forEach(f=>{if(f.checked)mealCals+=f.cals||0;});

    html+=`<div class="meal-section">
      <div class="meal-section-head">
        <h3>${mt}</h3>

    // Custom added foods
    custom.forEach((f,ci)=>{
      html+=`<div class="meal-food-row">
        <button class="meal-check${f.checked?' checked':''}" onclick="toggleCustomMealItem('${dateKey}','${mt}',${ci})">${f.checked?'&#10003;':''}</button>
