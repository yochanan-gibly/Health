          <div class="meal-food-name">${f.name}</div>
          <div class="meal-food-meta">${f.serving||'1 serving'} &bull; P:${f.protein||0}g C:${f.carbs||0}g F:${f.fat||0}g</div>
        </div>
        <div class="meal-food-cals">${f.cals||0} kcal</div>
        <button class="meal-food-del" onclick="removeCustomMealItem('${dateKey}','${mt}',${ci})" title="Remove">&#215;</button>
      </div>`;
    });

    html+=`<button class="add-food-btn" onclick="openAddFood('${dateKey}','${mt}')">+ Add food to ${mt}</button>
      </div>
    </div>`;
  });

  html+=`<div style="height:12px"></div>`;
  pg.innerHTML=html;
}

function toggleMealItem(dateKey,mt,id,val){
  setMealCheck(dateKey,mt,id,val);renderMealsPage();
}
function toggleCustomMealItem(dateKey,mt,idx){
  const arr=getCustomMealFoods(dateKey,mt);
  if(!arr[idx])return;
  arr[idx].checked=!arr[idx].checked;
  setCustomMealFoods(dateKey,mt,arr);renderMealsPage();
}
function removeCustomMealItem(dateKey,mt,idx){
  const arr=getCustomMealFoods(dateKey,mt);
  arr.splice(idx,1);
  setCustomMealFoods(dateKey,mt,arr);renderMealsPage();
}
function updateCustomMealQty(dateKey,mt,idx,field,val){
  const arr=getCustomMealFoods(dateKey,mt);
  if(!arr[idx])return;
  arr[idx][field]=parseFloat(val)||1;
  setCustomMealFoods(dateKey,mt,arr);
  // just re-render the calorie totals without rebuilding entire page
  renderMealsPage();
}

// ── FOOD REPOSITORY ───────────────────────────────────────────────────────────
// Unified repository of all foods & recipes for searching
function getRepository(){
  const repo=[];
  // Built-in plan items
  Object.values(DEFAULT_DIET_PLAN).forEach(plan=>{
    MEAL_TYPES.forEach(mt=>{
      (plan[mt]||[]).forEach(item=>{
        if(item.cheat)return;
        if(!repo.find(r=>r.name===item.name&&r.source==='Plan')){
          repo.push({...item,source:'Plan',baseCals:item.cals,baseProtein:item.protein,baseCarbs:item.carbs,baseFat:item.fat,baseServing:item.serving,qtyType:'servings'});
        }
      });
    });
  });
  // Custom foods
  customFoods.forEach((f,i)=>{
    repo.push({...f,source:'My Foods',idx:i,baseCals:f.cals,baseProtein:f.protein,baseCarbs:f.carbs,baseFat:f.fat,baseServing:f.serving,qtyType:f.qtyType||'servings',baseWeight:f.baseWeight||100});
  });
  // Custom recipes
  customRecipes.forEach((r,i)=>{
    repo.push({...r,source:'My Recipes',idx:i,baseCals:r.cals,baseProtein:r.protein,baseCarbs:r.carbs,baseFat:r.fat,baseServing:'1 serving',qtyType:'servings'});
  });
  return repo;
}

let _addFoodState={dateKey:'',mt:'',searchQuery:'',selectedFood:null,qty:1,qtyType:'servings'};

function openAddFood(dateKey,mt){
  _addFoodState={dateKey,mt,searchQuery:'',selectedFood:null,qty:1,qtyType:'servings'};
  renderAddFoodSheet();
}

function renderAddFoodSheet(){
  const modal=document.getElementById('cal-modal');
  modal.style.display='block';
  const{dateKey,mt,searchQuery,selectedFood}=_addFoodState;
  const repo=getRepository();
  const filtered=searchQuery.trim()===''?repo:repo.filter(f=>f.name.toLowerCase().includes(searchQuery.toLowerCase())||f.source.toLowerCase().includes(searchQuery.toLowerCase()));

  const searchRows=filtered.slice(0,30).map((f,i)=>{
    const isSel=selectedFood&&selectedFood.name===f.name&&selectedFood.source===f.source;
    return `<div class="search-result-row${isSel?' srr-selected':''}" onclick="selectRepoFood(${i})">
      <div>
        <div class="srr-name">${f.name}</div>
        <div style="font-size:11px;color:var(--text3)">${f.source} &bull; ${f.baseServing||f.serving}</div>
      </div>
      <div class="srr-cal">${f.baseCals} kcal</div>
    </div>`;
  }).join('');

  let qtyPanel='';
  if(selectedFood){
    const sf=selectedFood;
    const qty=_addFoodState.qty;
    const qt=_addFoodState.qtyType;
    let scaledCals,scaledP,scaledC,scaledF,scaledDesc;
    if(qt==='servings'){
      scaledCals=Math.round(sf.baseCals*qty);
      scaledP=Math.round(sf.baseProtein*qty);
      scaledC=Math.round(sf.baseCarbs*qty);
      scaledF=Math.round(sf.baseFat*qty);
      scaledDesc=`${qty} x ${sf.baseServing||sf.serving}`;
    } else {
      // weight mode - per 100g base
      const factor=qty/(sf.baseWeight||100);
      scaledCals=Math.round(sf.baseCals*factor);
      scaledP=Math.round(sf.baseProtein*factor);
      scaledC=Math.round(sf.baseCarbs*factor);
      scaledF=Math.round(sf.baseFat*factor);
      scaledDesc=`${qty}g`;
    }
    const canWeight=sf.baseWeight&&sf.baseWeight>0;
    qtyPanel=`<div class="qty-panel">
      <div class="qty-food-name">${sf.name}</div>
      <div class="qty-mode-row">
        <button class="qty-mode-btn${qt==='servings'?' active':''}" onclick="_addFoodState.qtyType='servings';renderAddFoodSheet()">Servings</button>
        ${canWeight?`<button class="qty-mode-btn${qt==='weight'?' active':''}" onclick="_addFoodState.qtyType='weight';renderAddFoodSheet()">Weight (g)</button>`:''}
      </div>
      <div class="qty-input-row">
        <label>${qt==='servings'?'Number of servings':'Weight (g)'}</label>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="qty-stepper" onclick="_addFoodState.qty=Math.max(${qt==='servings'?0.25:1},parseFloat((_addFoodState.qty-${qt==='servings'?0.25:10}).toFixed(2)));renderAddFoodSheet()">&#8722;</button>
          <input type="number" class="qty-input" value="${qty}" min="${qt==='servings'?0.25:1}" step="${qt==='servings'?0.25:10}" oninput="_addFoodState.qty=parseFloat(this.value)||1;renderAddFoodSheet()">
          <button class="qty-stepper" onclick="_addFoodState.qty=parseFloat((_addFoodState.qty+${qt==='servings'?0.25:10}).toFixed(2));renderAddFoodSheet()">&#43;</button>
        </div>
      </div>
      <div class="qty-preview">
        <div class="qty-preview-cals">${scaledCals} kcal</div>
        <div class="qty-preview-macros">P: ${scaledP}g &nbsp; C: ${scaledC}g &nbsp; F: ${scaledF}g</div>
        <div class="qty-preview-serving">${scaledDesc}</div>
      </div>
      <button class="sheet-submit" onclick="confirmAddFood()">Add to ${mt}</button>
    </div>`;
  }

  modal.innerHTML=`<div class="sheet-overlay" onclick="closeSheet()">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h2>Add to ${mt}</h2>
        <button class="sheet-close" onclick="closeSheet()">&#10005;</button>
      </div>
      <div class="sheet-body" style="padding-top:10px;">
        <div class="field-group">
          <div style="position:relative">
            <input type="text" id="food-search" placeholder="Search foods, recipes..." value="${searchQuery}"
              oninput="_addFoodState.searchQuery=this.value;_addFoodState.selectedFood=null;renderAddFoodSheet()" autocomplete="off"
              style="padding-right:36px;">
            ${searchQuery?`<button onclick="_addFoodState.searchQuery='';_addFoodState.selectedFood=null;renderAddFoodSheet()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--text3);font-size:16px;cursor:pointer;">&#10005;</button>`:''}
          </div>
          ${filtered.length===0?`<div style="padding:16px;text-align:center;color:var(--text3);font-size:13px;">No matches. Try a different search or add a new food below.</div>`
          :`<div class="search-results">${searchRows}</div>`}
        </div>
        ${qtyPanel}
        <div class="add-food-divider">— or add a new food manually —</div>
        <button class="add-food-manual-btn" onclick="openManualAddFood('${dateKey}','${mt}')">+ New food entry</button>

      </div>
    </div>
  </div>`;

  // Store filtered list for selection
  window._filteredRepo=filtered;
  // Restore focus to search
  setTimeout(()=>{const el=document.getElementById('food-search');if(el&&!selectedFood)el.focus();},50);
}

function selectRepoFood(filteredIdx){
  const food=window._filteredRepo[filteredIdx];
  if(!food)return;
  _addFoodState.selectedFood=food;
  _addFoodState.qty=1;
  _addFoodState.qtyType='servings';
  renderAddFoodSheet();
}

function confirmAddFood(){
  const{dateKey,mt,selectedFood,qty,qtyType}=_addFoodState;
  if(!selectedFood)return;
  const sf=selectedFood;
  let scaledCals,scaledP,scaledC,scaledF,servingDesc;
  if(qtyType==='servings'){
    scaledCals=Math.round(sf.baseCals*qty);
    scaledP=Math.round(sf.baseProtein*qty);
    scaledC=Math.round(sf.baseCarbs*qty);
    scaledF=Math.round(sf.baseFat*qty);
    servingDesc=qty===1?sf.baseServing||sf.serving:`${qty} x ${sf.baseServing||sf.serving}`;
  } else {
    const factor=qty/(sf.baseWeight||100);
    scaledCals=Math.round(sf.baseCals*factor);
    scaledP=Math.round(sf.baseProtein*factor);
    scaledC=Math.round(sf.baseCarbs*factor);
    scaledF=Math.round(sf.baseFat*factor);
    servingDesc=`${qty}g`;
  }
  const arr=getCustomMealFoods(dateKey,mt);

// ── Calorie data for graphs ───────────────────────────────────────────────────
function getDayCalories(date){
  const d=new Date(date);d.setHours(0,0,0,0);
  const offset=Math.round((d.getTime()-new Date().setHours(0,0,0,0))/(86400000));
  const dateKey=mealsDateKey(offset);
  const dayName=DAYS[d.getDay()];
  const plan=DEFAULT_DIET_PLAN[dayName]||DEFAULT_DIET_PLAN['Monday'];
  let total=0;
  MEAL_TYPES.forEach(mt=>{
    (plan[mt]||[]).forEach((item,i)=>{
      if(getMealCheck(dateKey,mt,`plan_${i}`))total+=item.cals;
    });
    getCustomMealFoods(dateKey,mt).forEach(f=>{if(f.checked)total+=f.cals||0;});
  });
  return total;
}

function exportCSV(){
  const wU=wLabel(),fU=fLabel();
  const rows=[[`Week`,`Day`,`Date`,`Category`,`Exercise`,`Set`,`Weight (${wU})`,`Reps`,`Time (min)`,`Notes`,`Done`,`Steps`,`Water (${fU})`,`Weight Morning (${wU})`,`Weight Evening (${wU})`]];
  for(let o=-12;o<=0;o++){
    const wk=wkKey(o),base=wkStart(o);
    DAYS.forEach((day,i)=>{
      const date=new Date(base);date.setDate(date.getDate()+i);
      const dateStr=date.toLocaleDateString('en-US');
      const plan=PLAN[day];
      const steps=logs[`daily|${wk}|${day}|steps`]||'';
      const water=logs[`daily|${wk}|${day}|water`]||'';
      const wm=logs[`daily|${wk}|${day}|weight_morning`]||'';
      const we=logs[`daily|${wk}|${day}|weight_evening`]||'';
      ['gym','home'].forEach(m=>{
        const exs=plan[m]||[];
        const cLog=logs[lk(wk,day,'cardio',0)];
        if(cLog)rows.push([weekLabel(o),day,dateStr,'Cardio',plan.cardio?.[m]?.name||'Cardio','','','',cLog.time||'',cLog.note||'',cLog.done?'Yes':'No',steps,water,wm,we]);
        exs.forEach((ex,ei)=>{
          const log=logs[lk(wk,day,'ex',ei)];if(!log)return;
          if(log.sets?.length>0){log.sets.forEach((sv,si)=>rows.push([weekLabel(o),day,dateStr,m,ex.name,si+1,sv.weight||'',sv.reps||'',sv.time||'',si===0?log.note||'':'',log.done?'Yes':'No',steps,water,wm,we]));}
          else rows.push([weekLabel(o),day,dateStr,m,ex.name,'','','','',log.note||'',log.done?'Yes':'No',steps,water,wm,we]);
        });
      });
    });
  }
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`workout_data_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  URL.revokeObjectURL(url);showToast('CSV downloaded!');
}
function importCSV(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const text=e.target.result;
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){showToast('CSV appears empty');return;}

      // Parse CSV rows — handle quoted fields with commas inside
      function parseCSVLine(line){
        const res=[];let cur='';let inQ=false;
        for(let i=0;i<line.length;i++){
          const c=line[i];
          if(c==='"'){
            if(inQ&&line[i+1]==='"'){cur+='"';i++;}
            else inQ=!inQ;
          } else if(c===','&&!inQ){res.push(cur.trim());cur='';}
          else cur+=c;
        }
        res.push(cur.trim());
        return res;
      }

      const header=parseCSVLine(lines[0]).map(h=>h.toLowerCase().replace(/[^a-z0-9]/g,'_'));
      // Expected header cols (from exportCSV):
      // week, day, date, category, exercise, set, weight, reps, time, notes, done, steps, water, weight_morning, weight_evening
      const col=name=>header.indexOf(name);
      const iWeek=col('week'),iDay=col('day'),iDate=col('date'),iCat=col('category');
      const iEx=col('exercise'),iSet=col('set'),iWeight=header.findIndex(h=>h.startsWith('weight_')?false:h==='weight__lb_'||h==='weight'),iReps=col('reps'),iTime=col('time__min_');
      const iNotes=col('notes'),iDone=col('done'),iSteps=col('steps'),iWater=col('water');
      const iWM=header.findIndex(h=>h.includes('weight_morning')||h.includes('morning'));
      const iWE=header.findIndex(h=>h.includes('weight_evening')||h.includes('evening'));

      if(iDay<0||iDate<0){showToast('CSV format not recognized. Please use a file exported from this app.');return;}

      let imported=0,skipped=0;
      const newLogs={...logs};

      lines.slice(1).forEach(line=>{
        if(!line.trim())return;
        const cols=parseCSVLine(line);
        const day=cols[iDay]?.trim();
        const dateStr=cols[iDate]?.trim();
        const cat=cols[iCat]?.trim().toLowerCase();
        const exName=cols[iEx]?.trim();
        const setNum=parseInt(cols[iSet])||0;
        const done=(cols[iDone]||'').trim().toLowerCase()==='yes';
        const notes=(cols[iNotes]||'').trim();
        const steps=parseFloat(cols[iSteps])||0;
        const water=parseFloat(cols[iWater])||0;
        const wm=parseFloat(cols[iWM])||0;
        const we=parseFloat(cols[iWE])||0;

        if(!day||!dateStr)return;

        // Convert date string to wkKey
        let wk;
        try{
          const d=new Date(dateStr);
          if(isNaN(d.getTime())){skipped++;return;}
          d.setHours(0,0,0,0);
          const sun=new Date(d);sun.setDate(d.getDate()-d.getDay());
          wk=sun.toISOString().slice(0,10);
        }catch(err){skipped++;return;}

        // Daily trackers
        if(steps>0){
          const k=`daily|${wk}|${day}|steps`;
          if(!newLogs[k]||newLogs[k]<steps)newLogs[k]=steps;
        }
        if(water>0){
          const k=`daily|${wk}|${day}|water`;
          if(!newLogs[k]||newLogs[k]<water)newLogs[k]=water;
        }
        if(wm>0){newLogs[`daily|${wk}|${day}|weight_morning`]=wm;}
        if(we>0){newLogs[`daily|${wk}|${day}|weight_evening`]=we;}

        // Exercise / cardio data
        if(exName&&cat){
          // Find exercise index in plan
          const plan=PLAN[day];
          if(!plan)return;
          if(cat==='cardio'){
            const k=lk(wk,day,'cardio',0);
            if(!newLogs[k])newLogs[k]={done:false,sets:[]};
            if(done)newLogs[k].done=true;
            if(notes)newLogs[k].note=notes;
          } else {
            // gym or home mode
            const mode=cat==='gym'?'gym':'home';
            const exList=plan[mode]||[];
            const exIdx=exList.findIndex(e=>e.name.toLowerCase()===exName.toLowerCase());
            if(exIdx<0)return;
            const k=lk(wk,day,'ex',exIdx);
            if(!newLogs[k])newLogs[k]={done:false,sets:[]};
            if(done)newLogs[k].done=true;
            if(notes&&!newLogs[k].note)newLogs[k].note=notes;
            if(setNum>0){
              const si=setNum-1;
              while(newLogs[k].sets.length<=si)newLogs[k].sets.push({});
              const wVal=iWeight>=0?(cols[iWeight]||'').trim():'';
              const rVal=iReps>=0?(cols[iReps]||'').trim():'';
              const tVal=iTime>=0?(cols[iTime]||'').trim():'';
              if(wVal)newLogs[k].sets[si].weight=wVal;
              if(rVal)newLogs[k].sets[si].reps=rVal;
              if(tVal)newLogs[k].sets[si].time=tVal;
            }
          }
        }
        imported++;
      });

      logs=newLogs;
      saveData();
      showToast(`Imported ${imported} rows successfully!`);
      // reset file input
      input.value='';
      renderSettingsPage();
    }catch(err){
      console.error('CSV import error:',err);
      showToast('Import failed — check file format');
      input.value='';
    }
  };
  reader.readAsText(file);
}

function clearData(){
  if(confirm('Delete all workout data? This cannot be undone.')){
    localStorage.removeItem('wt_logs');logs={};showToast('All data cleared');renderWorkoutPage();
  }
}

// ─── APPEARANCE ──────────────────────────────────────────────────────────────
const THEMES={
  system:{label:'System default',bg:null},
  light:{label:'Light',bg:'#ffffff',bg2:'#f5f5f5',bg3:'#ebebeb',text:'#1a1a1a',text2:'#666666',text3:'#999999',border:'rgba(0,0,0,0.12)',border2:'rgba(0,0,0,0.2)'},
  dark:{label:'Dark',bg:'#1c1c1e',bg2:'#2c2c2e',bg3:'#3a3a3c',text:'#f2f2f7',text2:'#aeaeb2',text3:'#636366',border:'rgba(255,255,255,0.1)',border2:'rgba(255,255,255,0.2)'},
  midnight:{label:'Midnight',bg:'#0a0a0f',bg2:'#12121a',bg3:'#1e1e28',text:'#e8e8f0',text2:'#8888aa',text3:'#555570',border:'rgba(255,255,255,0.08)',border2:'rgba(255,255,255,0.15)'},
  warm:{label:'Warm',bg:'#fdf6ee',bg2:'#f5ece0',bg3:'#ecddd0',text:'#2d1f0e',text2:'#7a5c3e',text3:'#b08060',border:'rgba(100,60,20,0.15)',border2:'rgba(100,60,20,0.25)'},
  forest:{label:'Forest',bg:'#f0f5f0',bg2:'#e2ede2',bg3:'#d0e4d0',text:'#1a2e1a',text2:'#4a6b4a',text3:'#7a9b7a',border:'rgba(30,80,30,0.15)',border2:'rgba(30,80,30,0.25)'},
  ocean:{label:'Ocean',bg:'#f0f5ff',bg2:'#e0eaff',bg3:'#ccdaff',text:'#0a1a3a',text2:'#3a5a8a',text3:'#6a8aba',border:'rgba(10,40,120,0.12)',border2:'rgba(10,40,120,0.22)'},
  custom:{label:'Custom'},
};
const ACCENT_COLORS={
  blue:{label:'Blue',val:'#1a73e8'},
  purple:{label:'Purple',val:'#7c3aed'},
  green:{label:'Green',val:'#16a34a'},
  orange:{label:'Orange',val:'#ea580c'},
  pink:{label:'Pink',val:'#db2777'},
  teal:{label:'Teal',val:'#0891b2'},
  red:{label:'Red',val:'#dc2626'},
};
const FONT_SIZES={sm:{label:'Small',base:'13px'},md:{label:'Medium',base:'15px'},lg:{label:'Large',base:'17px'},xl:{label:'Extra large',base:'19px'}};

let appearance={
  theme:'system',      // key from THEMES
  accent:'blue',       // key from ACCENT_COLORS
  fontSize:'md',       // key from FONT_SIZES
  customBg:'#ffffff',
  customText:'#1a1a1a',
  customBg2:'#f5f5f5',
  customText2:'#666666',
};

function loadAppearance(){
  try{const a=JSON.parse(localStorage.getItem('wt_appearance')||'{}');Object.assign(appearance,a);}catch(e){}
  applyAppearance();
}
function saveAppearance(){
  try{localStorage.setItem('wt_appearance',JSON.stringify(appearance));}catch(e){}
}
function applyAppearance(){
  const root=document.documentElement;
  const t=THEMES[appearance.theme];
  // Apply theme (skip if 'system' — let CSS media query handle it)
  if(appearance.theme!=='system'&&t){
    root.style.setProperty('--bg',t.bg);
    root.style.setProperty('--bg2',t.bg2);
    root.style.setProperty('--bg3',t.bg3);
    root.style.setProperty('--text',t.text);
    root.style.setProperty('--text2',t.text2);
    root.style.setProperty('--text3',t.text3);
    root.style.setProperty('--border',t.border);
    root.style.setProperty('--border2',t.border2);
  } else if(appearance.theme==='custom'){
    root.style.setProperty('--bg',appearance.customBg);
    root.style.setProperty('--bg2',appearance.customBg2);
    root.style.setProperty('--bg3',adjustHex(appearance.customBg2,-10));
    root.style.setProperty('--text',appearance.customText);
    root.style.setProperty('--text2',appearance.customText2);
    root.style.setProperty('--text3',mixHex(appearance.customText2,appearance.customBg,0.5));
    root.style.setProperty('--border','rgba(128,128,128,0.18)');
    root.style.setProperty('--border2','rgba(128,128,128,0.3)');
  } else {
    // Reset to CSS defaults (system)
    ['--bg','--bg2','--bg3','--text','--text2','--text3','--border','--border2'].forEach(v=>root.style.removeProperty(v));
  }
  // Accent color
  const acc=ACCENT_COLORS[appearance.accent];
  if(acc){
    root.style.setProperty('--blue',acc.val);
    root.style.setProperty('--blue-bg',hexWithAlpha(acc.val,0.12));
    root.style.setProperty('--blue-text',acc.val);
  }
  // Font size
  const fs=FONT_SIZES[appearance.fontSize];
  if(fs) document.body.style.fontSize=fs.base;
}

function hexWithAlpha(hex,alpha){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function adjustHex(hex,amt){
  let r=parseInt(hex.slice(1,3),16)+amt,g=parseInt(hex.slice(3,5),16)+amt,b=parseInt(hex.slice(5,7),16)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function mixHex(hex1,hex2,t){
  const r=Math.round(parseInt(hex1.slice(1,3),16)*(1-t)+parseInt(hex2.slice(1,3),16)*t);
  const g=Math.round(parseInt(hex1.slice(3,5),16)*(1-t)+parseInt(hex2.slice(3,5),16)*t);
  const b=Math.round(parseInt(hex1.slice(5,7),16)*(1-t)+parseInt(hex2.slice(5,7),16)*t);
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

activeDay=DAYS[new Date().getDay()];
